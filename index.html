<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Fever Tracker"/>
<meta name="theme-color" content="#1D6FA4"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon-192.png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Fever Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#EEF3F8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  #loading{display:flex;align-items:center;justify-content:center;min-height:100vh;color:#6B7E92;font-size:15px;flex-direction:column;gap:12px}
  .spin{width:32px;height:32px;border:3px solid #DDE5EE;border-top-color:#1D6FA4;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  input[type=date],input[type=time]{-webkit-appearance:none;appearance:none}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div>Loading Fever Tracker…</div>
<div id="root"></div>

<script src="bundle.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }
</script>
</body>
</html>
